name: Deploy to one.com

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-onecom
  cancel-in-progress: false

jobs:
  deploy:
    name: Sync to one.com via SFTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Stage files for upload
        run: |
          mkdir -p _deploy
          cp -r index.html favicon.svg robots.txt sitemap.xml site.webmanifest css js assets _deploy/
          ls -la _deploy/

      - name: Upload to one.com via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SFTP_USERNAME }}
          server: ${{ secrets.SFTP_SERVER }}
          port: 22
          password: ${{ secrets.SFTP_PASSWORD }}
          local_path: './_deploy/*'
          remote_path: ${{ vars.SFTP_REMOTE_PATH || './webroots' }}
          sftp_only: true
